<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inventory Management System</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f3f4f6;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 1rem;
    }

    .container {
      max-width: 800px;
      width: 100%;
      margin: 0 auto;
      padding: 1rem;
    }

    .title {
      font-size: 1.875rem;
      font-weight: bold;
      margin-bottom: 1.5rem;
      text-align: center;
      color: #1f2937;
    }

    .form-container {
      background: white;
      padding: 1.5rem;
      border-radius: 0.5rem;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      margin-bottom: 1.5rem;
    }

    .section-title {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 1rem;
      color: #1f2937;
    }

    .form-inputs {
      display: flex;
      gap: 1rem;
      align-items: center;
    }

    .input-field {
      flex: 1;
      padding: 0.5rem;
      border: 1px solid #d1d5db;
      border-radius: 0.375rem;
      font-size: 1rem;
    }

    .quantity-input {
      width: 8rem;
    }

    .add-button {
      background-color: #3b82f6;
      color: white;
      padding: 0.5rem 1rem;
      border-radius: 0.375rem;
      border: none;
      font-size: 1rem;
      cursor: pointer;
    }

    .add-button:hover:not(:disabled) {
      background-color: #2563eb;
    }

    .add-button:disabled {
      background-color: #93c5fd;
      cursor: not-allowed;
    }

    .error-text {
      color: #ef4444;
      margin-top: 0.5rem;
      font-size: 0.875rem;
    }

    .list-container {
      background: white;
      padding: 1.5rem;
      border-radius: 0.375rem;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    .loading-text, .empty-text {
      color: #6b7280;
      font-size: 1rem;
    }

    .item-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem;
      border: 1px solid #e5e7eb;
      border-radius: 0.375rem;
      margin-bottom: 1rem;
    }

    .item-name {
      font-weight: 500;
      color: #1f2937;
    }

    .item-quantity {
      color: #6b7280;
      font-size: 0.875rem;
    }

    .delete-button {
      background-color: #ef4444;
      color: white;
      padding: 0.25rem 0.75rem;
      border-radius: 0.375rem;
      border: none;
      font-size: 0.875rem;
      cursor: pointer;
    }

    .delete-button:hover:not(:disabled) {
      background-color: #dc2626;
    }

    .delete-button:disabled {
      background-color: #f87171;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="title">Inventory Management System</h1>

    <div class="form-container">
      <h2 class="section-title">Add New Item</h2>
      <div class="form-inputs">
        <input
          type="text"
          id="item-name"
          placeholder="Item Name"
          class="input-field"
        />
        <input
          type="number"
          id="item-quantity"
          placeholder="Quantity"
          class="input-field quantity-input"
        />
        <button id="add-button" class="add-button">Add Item</button>
      </div>
      <p id="error-text" class="error-text" style="display: none;"></p>
    </div>

    <div class="list-container">
      <h2 class="section-title">Inventory Items</h2>
      <p id="loading-text" class="loading-text" style="display: none;">Loading...</p>
      <p id="empty-text" class="empty-text" style="display: none;">No items in inventory.</p>
      <ul id="item-list" class="item-list"></ul>
    </div>
  </div>

  <script>
    const itemList = document.getElementById('item-list');
    const addButton = document.getElementById('add-button');
    const itemNameInput = document.getElementById('item-name');
    const itemQuantityInput = document.getElementById('item-quantity');
    const errorText = document.getElementById('error-text');
    const loadingText = document.getElementById('loading-text');
    const emptyText = document.getElementById('empty-text');

    let items = [];
    let isLoading = false;

    function showError(message) {
      errorText.textContent = message;
      errorText.style.display = message ? 'block' : 'none';
    }

    function toggleLoading(show) {
      isLoading = show;
      loadingText.style.display = show ? 'block' : 'none';
      addButton.disabled = show;
      document.querySelectorAll('.delete-button').forEach(btn => btn.disabled = show);
    }

    function renderItems() {
      itemList.innerHTML = '';
      emptyText.style.display = items.length === 0 && !isLoading ? 'block' : 'none';
      items.forEach(item => {
        const li = document.createElement('li');
        li.className = 'item';
        li.innerHTML = `
          <div>
            <p class="item-name">${item.name}</p>
            <p class="item-quantity">Quantity: ${item.quantity}</p>
          </div>
          <button class="delete-button" data-id="${item.id}">Delete</button>
        `;
        itemList.appendChild(li);
      });
    }

    async function fetchItems() {
      toggleLoading(true);
      try {
        const response = await fetch('https://jsonplaceholder.typicode.com/posts?_limit=5');
        if (!response.ok) throw new Error('Failed to fetch items');
        const data = await response.json();
        items = data.map(item => ({
          id: item.id,
          name: item.title.slice(0, 20),
          quantity: Math.floor(Math.random() * 100)
        }));
        renderItems();
      } catch (err) {
        showError(err.message || 'Failed to fetch items');
      } finally {
        toggleLoading(false);
      }
    }

    async function addItem(e) {
      e.preventDefault();
      const name = itemNameInput.value.trim();
      const quantity = itemQuantityInput.value.trim();
      if (!name || !quantity) {
        showError('Please enter both name and quantity');
        return;
      }

      toggleLoading(true);
      try {
        const response = await fetch('https://jsonplaceholder.typicode.com/posts', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title: name, body: `Quantity: ${quantity}` })
        });
        if (!response.ok) throw new Error('Failed to add item');
        const data = await response.json();
        items.push({
          id: data.id || Date.now(),
          name,
          quantity: parseInt(quantity)
        });
        itemNameInput.value = '';
        itemQuantityInput.value = '';
        showError('');
        renderItems();
      } catch (err) {
        showError(err.message || 'Failed to add item');
      } finally {
        toggleLoading(false);
      }
    }

    async function deleteItem(id) {
      toggleLoading(true);
      try {
        const response = await fetch(`https://jsonplaceholder.typicode.com/posts/${id}`, {
          method: 'DELETE'
        });
        if (!response.ok) throw new Error('Failed to delete item');
        items = items.filter(item => item.id !== id);
        renderItems();
      } catch (err) {
        showError(err.message || 'Failed to delete item');
      } finally {
        toggleLoading(false);
      }
    }

    addButton.addEventListener('click', addItem);
    itemList.addEventListener('click', (e) => {
      if (e.target.classList.contains('delete-button')) {
        const id = parseInt(e.target.getAttribute('data-id'));
        deleteItem(id);
      }
    });

    // Initial fetch
    fetchItems();
  </script>
</body>
</html>
